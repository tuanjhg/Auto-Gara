<div class="w-full">
    <div class="flex items-center justify-between pb-4 bg-gray-100">
        <div
            (click)="isGarageMenuOpen = !isGarageMenuOpen"
            class="relative flex items-center justify-center bg-white py-2 px-4 rounded-lg min-w-[240px] w-auto select-none cursor-pointer"
        >
            Show: <span class="font-bold ml-1">{{ selectedGarageLabel }}</span>
            <div
                *ngIf="isGarageMenuOpen"
                class="absolute right-0 top-full mt-2 min-w-full bg-white border rounded-xl border-gray-200 shadow-lg z-20"
                style="transition: opacity 0.3s ease-in-out"
                [ngClass]="{ 'opacity-0 pointer-events-none': !isGarageMenuOpen, 'opacity-100': isGarageMenuOpen }"
            >
                <div style="max-height: 300px; overflow-y: auto">
                    <a
                        (click)="$event.stopPropagation(); selectGarage({ value: 'all', label: 'All' }); isGarageMenuOpen = false"
                        href="javascript:void(0)"
                        class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900"
                        role="menuitem"
                    >
                        All
                    </a>
                    <a
                        *ngFor="let gara of garas"
                        (click)="$event.stopPropagation(); selectGarage(gara); isGarageMenuOpen = false"
                        href="javascript:void(0)"
                        class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900"
                        role="menuitem"
                    >
                        {{ gara.name }}
                    </a>
                </div>
            </div>
        </div>
        <button (click)="openAdd()" class="flex items-center justify-center w-2/12 h-11 bg-white text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50">
            <mat-icon svgIcon="add"></mat-icon>
            <span class="text-base">Add new order</span>
        </button>
    </div>
    <div class="flex flex-col bg-white mb-4 mt-4 min-w-0">
        <div class="mb-4 p-4">
            <app-common-filter-bar [searchText]="searchText" (searchChange)="onSearchChange($event)"> </app-common-filter-bar>
            <app-common-table
                [columns]="tableColumns"
                [data]="displayData"
                [sortColumn]="sortColumn"
                [sortOrder]="sortOrder"
                [paginationArray]="paginationArray"
                [currentPage]="currentPage"
                [totalPages]="totalPages"
                [pageSize]="pageSize"
                (sort)="changeSort($event)"
                (pageChange)="changePage($event)"
                (pageSizeChange)="pageSize = $event; changePage(1)"
                (action)="handleTableAction($event)"
            >
            </app-common-table>
        </div>
    </div>
</div>
<app-loading *ngIf="loadingService.loading$ | async" class="z-[10000]"></app-loading>
