<app-confirm-model
  [open]="showDeleteConfirm"
  title="Delete User?"
  message="Are you sure you want to delete this user? This action cannot be undone."
  confirmText="Delete"
  cancelText="Cancel"
  confirmClass="bg-red-500 hover:bg-red-600 text-white"
  cancelClass="bg-gray-200 hover:bg-gray-300 text-gray-900"
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()">
</app-confirm-model>

<app-loading *ngIf="loadingService.loading$ | async" class="z-[10000]"></app-loading>

<div class="flex flex-col min-w-full">
  <div class="flex flex-col">
    <div class="flex flex-col sm:flex-row sm:justify-between gap-4">
      <div *ngIf="isAdmin" class="flex items-center justify-center bg-white py-2 px-4 rounded-lg relative order-2 sm:order-1" 
           (clickOutside)="isTenantDropdownOpen = false">
        <span class="mr-2 hidden sm:inline">Show:</span>
        <span class="font-bold mr-1">{{ selectedTenantName }}</span>
        <button (click)="toggleTenantDropdown()" class="hover:bg-gray-200 w-5 h-6">
          <mat-icon svgIcon="arrow_drop_down"></mat-icon>
        </button>
        
        <div *ngIf="isTenantDropdownOpen" 
             class="absolute left-0 top-full mt-1 w-48 bg-white border rounded-lg border-gray-200 shadow-lg z-20">
          <div class="py-1">
            <button (click)="selectTenant(null)"
                    class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900"
                    [class.bg-gray-100]="selectedTenantId === null">
              All Garages
            </button>
            <button *ngFor="let tenant of tenants" 
                    (click)="selectTenant(tenant)"
                    class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900"
                    [class.bg-gray-100]="isSelectedTenant(tenant)">
              {{ tenant.name }}
            </button>
          </div>
        </div>
      </div>
      
      <div *ngIf="!isAdmin" class="flex-1 order-2 sm:order-1"></div>
      
      <button (click)="openCreateModal()" class="w-full sm:w-auto bg-white rounded-lg font-semibold py-2 px-4 shadow-sm hover:bg-gray-200 flex items-center justify-center gap-2 order-1 sm:order-2">
        <mat-icon svgIcon="add"></mat-icon>
        <span class="hidden sm:inline">Add User</span>
        <span class="sm:hidden">Add</span>
      </button>
    </div>
  </div>

  <div class="flex flex-col bg-white mb-4 mt-4">
    <div class="mb-4 p-4">
      <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 mb-4">
        <div class="flex-grow order-1">
          <div class="relative">
            <div class="absolute p-1 inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <mat-icon svgIcon="search"></mat-icon>
            </div>
            <input type="text"
              placeholder="Search by username, email, full name, role..."
              class="h-12 w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-200 bg-[#F5F8FA]"
              [ngModel]="searchText"
              (ngModelChange)="onSearchChange($event)"
            >
          </div>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow overflow-y-auto mb-4">
        <div style="overflow-x:auto;">
          <table class="w-full min-w-[600px] bg-white rounded-lg">
            <thead class="sticky top-0 z-10 bg-gray-50">
              <ng-container *ngFor="let col of tableColumns">
                <th *ngIf="col.key !== 'all' && col.key !== 'actions'"
                  class="py-3 px-6 text-xs font-medium text-gray-500 uppercase tracking-wider"
                  [ngClass]="col.className || 'text-left'"
                  [class.cursor-pointer]="col.key === 'username' || col.key === 'full_name' || col.key === 'email'"
                  [class.select-none]="col.key === 'username' || col.key === 'full_name' || col.key === 'email'"
                  (click)="(col.key === 'username' || col.key === 'full_name' || col.key === 'email') && changeSort(col.key)"
                >
                  <span class="flex items-center gap-1">
                    {{ col.label }}
                    <ng-container *ngIf="sortColumn === col.key">
                      <mat-icon svgIcon="arrow_upward" *ngIf="sortOrder === 'asc'" class="inline text-xs"></mat-icon>
                      <mat-icon svgIcon="arrow_downward" *ngIf="sortOrder === 'desc'" class="inline text-xs"></mat-icon>
                    </ng-container>
                    <ng-container *ngIf="sortColumn !== col.key">
                      <mat-icon svgIcon="swap_vert" class="inline text-xs text-gray-300"></mat-icon>
                    </ng-container>
                  </span>
                </th>
                <th *ngIf="col.key === 'actions'" 
                  [ngClass]="col.className"
                  class="py-3 px-6 text-xs font-medium text-gray-500 uppercase tracking-wider">
                  {{ col.label }}
                </th>
                <th *ngIf="col.key === 'all'" class="text-xs font-medium text-gray-500 uppercase tracking-wider">
                </th>
              </ng-container>
            </thead>
            <tbody class="divide-y divide-gray-200">
              <tr *ngFor="let row of displayData" class="hover:bg-gray-50 cursor-pointer">
                <td *ngFor="let col of tableColumns" class="py-4 px-6" [ngClass]="col.className || 'text-left'">
                  <ng-container [ngSwitch]="col.key">
                    
                    <div *ngSwitchCase="'actions'">
                      <div class="inline-flex items-center gap-2">
                        <button (click)="openDetailModal(row.user_id)" class="!text-yellow-500 hover:!text-yellow-600 focus:!text-yellow-700">
                          <mat-icon style="transform: scale(0.9); color: #eab308 !important;" svgIcon="create"></mat-icon>
                        </button>
                        <button (click)="openConfirmModel(row.user_id)" class="!text-red-500 hover:!text-red-600 focus:!text-red-700">
                          <mat-icon style="transform: scale(0.9); color: #ef4444 !important;" svgIcon="delete_forever"></mat-icon>
                        </button>
                      </div>
                    </div>

                    <div *ngSwitchCase="'is_active'" class="text-center">
                      <span [ngClass]="{
                        'bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-medium': row[col.key] === true,
                        'bg-red-100 text-red-800 px-2 py-1 rounded-full text-xs font-medium': row[col.key] === false
                      }">
                        {{ row[col.key] ? 'Active' : 'Inactive' }}
                      </span>
                    </div>

                    <span *ngSwitchCase="'role'" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                      [ngClass]="{
                        'bg-purple-100 text-purple-800': row[col.key] === 'Admin',
                        'bg-blue-100 text-blue-800': row[col.key] === 'Owner',
                        'bg-green-100 text-green-800': row[col.key] === 'Mechanic',
                        'bg-yellow-100 text-yellow-800': row[col.key] === 'Accountant',
                        'bg-gray-100 text-gray-800': !['Admin', 'Owner', 'Mechanic', 'Accountant'].includes(row[col.key])
                      }">
                      {{ row[col.key] }}
                    </span>

                    <span *ngSwitchCase="'created_at'">
                      {{ row[col.key] | date:'dd/MM/yyyy' }}
                    </span>

                    <span *ngSwitchDefault class="font-sans text-gray-900">
                      {{ row[col.key] }}
                    </span>

                  </ng-container>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="flex flex-col sm:flex-row items-center justify-between p-4 min-w-full bg-white gap-4">
          <div class="text-sm text-gray-600 order-2 sm:order-1">
            Show result:
            <select [(ngModel)]="pageSize" (change)="changePage(1)"
              class="ml-2 border border-gray-300 rounded px-2 py-1 text-sm">
              <option *ngFor="let size of [5,10,15]" [value]="size">{{ size }}</option>
            </select>
          </div>
          <div class="flex items-center space-x-1 order-1 sm:order-2">
            <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1"
              class="w-8 h-8 flex items-center justify-center border rounded-full text-gray-600 hover:bg-gray-200 disabled:opacity-50">
              <mat-icon svgIcon="arrow_left" class="text-sm"></mat-icon>
            </button>
            <ng-container *ngFor="let page of paginationArray">
              <button (click)="changePage(page)" [ngClass]="{
                'bg-black text-white': currentPage === page,
                'text-gray-600 hover:bg-gray-200': currentPage !== page
              }" class="w-8 h-8 flex items-center justify-center border rounded-xl text-sm font-medium">
                {{ page }}
              </button>
            </ng-container>
            <button (click)="changePage(currentPage + 1)" [disabled]="currentPage === totalPages"
              class="w-8 h-8 flex items-center justify-center border rounded-full text-gray-600 hover:bg-gray-200 disabled:opacity-50">
              <mat-icon svgIcon="arrow_right" class="text-sm"></mat-icon>
            </button>
          </div>
        </div>
      </div>

      <div *ngIf="isCreateModalOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" (click)="closeModal('create')">
        <div class="bg-gray-100 rounded-lg shadow-2xl w-full max-w-2xl max-h-[120vh]" (click)="$event.stopPropagation()">
          <app-add-user (closeModalRequest)="closeModal('create')" (userAdded)="loadUsers()"></app-add-user>
        </div>
      </div>

      <div *ngIf="isDetailModalOpen && passUserId">
        <app-user-detail (closeModalRequest)="closeModal('detail')" (editRequest)="onUserEdited($event)" [userId]="passUserId"></app-user-detail>
      </div>
    </div>
  </div>
</div>
