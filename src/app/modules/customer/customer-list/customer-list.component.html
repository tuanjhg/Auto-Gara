<app-confirm-model [open]="showDeleteConfirm" title="Delete Customer?"
  message="Are you sure you want to delete this customer? This action cannot be undone." confirmText="Delete"
  cancelText="Cancel" confirmClass="bg-red-500 hover:bg-red-600 text-white"
  cancelClass="bg-gray-200 hover:bg-gray-300 text-gray-900" (confirmed)="confirmDelete()" (cancelled)="cancelDelete()">
</app-confirm-model>

<app-loading *ngIf="loadingService.loading$ | async" class="z-[10000]"></app-loading>

<div class="flex flex-col min-w-full">
  <div class="flex flex-col">
    <div class="flex flex-row justify-between">
      <app-garage-selector [selectedGaraId]="selectedGaraId" [userRole]="userRole" labelText="Show:"
        allGaraText="All Gara"
        containerClass="flex items-center bg-white rounded-lg border border-gray-200 shadow px-2 py-1 w-[280px]"
        (garaSelected)="onGaraSelected($event)">
      </app-garage-selector>


      <button (click)="openCreateModal()"
        class="w-full sm:w-auto text-lg bg-white rounded-lg font-semibold py-2 px-4 shadow-sm hover:bg-gray-200 flex items-center justify-center gap-2">
        <mat-icon svgIcon="add"></mat-icon>
        Add Customer
      </button>
    </div>

    <div class="flex flex-col bg-white mb-4 mt-4">
      <div class="mb-4 p-4">
        <app-common-filter-bar [searchText]="searchText" (searchChange)="onSearchChange($event)">
        </app-common-filter-bar>


        <ng-template #fullNameCell let-row>
          {{ row.full_name }}
          <mat-icon svgIcon="circle" class="ml-1"
            [ngClass]="(row.is_active === true || row.is_active === 'true') ? 'text-green-500' : 'text-red-500'"
            [attr.title]="(row.is_active === true || row.is_active === 'true') ? 'Active' : 'Inactive'"
            style="transform: scale(0.3); vertical-align: middle;">
          </mat-icon>
        </ng-template>

        <app-common-table [columns]="tableColumns" [data]="displayData" [sortColumn]="sortColumn"
          [sortOrder]="sortOrder" [paginationArray]="paginationArray" [currentPage]="currentPage"
          [totalPages]="totalPages" [pageSize]="pageSize" [cellTemplates]="cellTemplates" (sort)="changeSort($event)"
          (pageChange)="changePage($event)" (pageSizeChange)="pageSize = $event; changePage(1)"
          (action)="handleTableAction($event)">
        </app-common-table>

        <div *ngIf="isCreateModalOpen"
          class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
          (click)="closeModal('create', false)">
          <div class="bg-gray-100 rounded-lg shadow-2xl w-full max-w-2xl max-h-[120vh]"
            (click)="$event.stopPropagation()">
            <app-add-customer (closed)="closeModal('create', $event)"></app-add-customer>
          </div>
        </div>

        <div *ngIf="isDetailModalOpen"
          class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
          (click)="closeModal('detail', false)">
          <div class="bg-gray-100 rounded-lg shadow-2xl w-full max-w-2xl max-h-[120vh]"
            (click)="$event.stopPropagation()">
            <app-customer-detail [open]="isDetailModalOpen" (closed)="closeModal('detail', $event)"
              [id]="selectedId"></app-customer-detail>
          </div>
        </div>
      </div>
    </div>
