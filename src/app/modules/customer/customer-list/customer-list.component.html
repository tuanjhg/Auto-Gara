<app-confirm-model
  [open]="showDeleteConfirm"
  title="Delete Customer?"
  message="Are you sure you want to delete this customer? This action cannot be undone."
  confirmText="Delete"
  cancelText="Cancel"
  confirmClass="bg-red-500 hover:bg-red-600 text-white"
  cancelClass="bg-gray-200 hover:bg-gray-300 text-gray-900"
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()">
</app-confirm-model>

<app-loading *ngIf="loadingService.loading$ | async" class="z-[10000]"></app-loading>

<div class="flex flex-col min-w-full">
    <div class="flex flex-col">
      <div class="flex flex-row justify-between">
        <div (click)="isGarageMenuOpen = !isGarageMenuOpen; isColumnMenuOpen = false" class="relative flex items-center justify-center bg-white py-2 px-4 rounded-lg min-w-[120px] w-auto select-none cursor-pointer">
          Show: <span class="font-bold ml-1">{{ selectedGarageLabel }}</span>
          <div *ngIf="isGarageMenuOpen"
            class="absolute right-0 top-full mt-2 min-w-full bg-white border rounded-xl border-gray-200 shadow-lg z-20"
            style="transition: opacity 0.3s ease-in-out;"
            [ngClass]="{'opacity-0 pointer-events-none': !isGarageMenuOpen, 'opacity-100': isGarageMenuOpen}">
            <div style="max-height: 300px; overflow-y: auto;">
            <a *ngFor="let gara of garas" (click)="$event.stopPropagation(); selectGarage(gara); isGarageMenuOpen = false"
              href="javascript:void(0)"
              class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900"
              role="menuitem">
              {{ gara.name }}
            </a>
            </div>
          </div>
        </div>
        <button (click)="openCreateModal()" class="w-full sm:w-auto bg-white rounded-lg font-semibold py-2 px-4 shadow-sm hover:bg-gray-200 flex items-center justify-center gap-2">
          <mat-icon svgIcon="add"></mat-icon>
          Add Customer
        </button>
      </div>

  <div class="flex flex-col bg-white mb-4 mt-4">
      <div class="mb-4 p-4">
        <div class="flex items-center gap-4 mb-4">
          <div class="flex-grow">
            <div class="relative">
              <div class="absolute p-1 inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <mat-icon svgIcon="search"></mat-icon>
              </div>
              <input type="text"
                placeholder="Search by name, phone, email, address..."
                class="h-12 w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-200 bg-[#F5F8FA]"
                [ngModel]="searchText"
                (ngModelChange)="onSearchChange($event)"
              >
            </div>
          </div>
          <div class="relative">
            <button (click)="isColumnMenuOpen = !isColumnMenuOpen; isGarageMenuOpen = false"
              class="flex items-center justify-center h-12 min-w-[110px] px-4 py-2 text-base text-gray-600 border border-gray-200 rounded-xl bg-[#F5F8FA] hover:bg-gray-100">
              <mat-icon class="w-5 h-5 mr-2" svgIcon="filter_alt"></mat-icon>
              <span>Filter: <span class="font-bold">{{ filterColumnLabel }}</span></span>
            </button>
            <div *ngIf="isColumnMenuOpen"
              class="absolute right-0 top-full mt-2 w-32 bg-white border rounded-xl border-gray-200 shadow-lg z-20"
              style="transition: opacity 0.3s ease-in-out;"
              [ngClass]="{'opacity-0 pointer-events-none': !isColumnMenuOpen, 'opacity-100': isColumnMenuOpen}">
              <div *ngFor="let option of tableColumns; let i = index" class="py-1" role="menu" aria-orientation="vertical" aria-labelledby="options-menu">
                <a *ngIf="i < tableColumns.length - 1"
                  (click)="selectFilter(option); isColumnMenuOpen = false"
                  href="javascript:void(0)"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900"
                  role="menuitem">
                  {{ option.label }}
                </a>
              </div>
            </div>
          </div>
        </div>

      <div class="bg-white rounded-lg shadow overflow-y-auto mb-4">
          <div style="overflow-x:auto;">
              <table class="w-full min-w-[600px] bg-white rounded-lg">
            <thead class="sticky top-0 z-10 bg-gray-50">
               <ng-container *ngFor="let col of tableColumns">
        <th *ngIf="col.key !== 'all' && col.key !== 'actions'"
          class="py-3 px-6 text-xs font-medium text-gray-500 uppercase tracking-wider"
          [ngClass]="col.className || 'text-left'"
          [class.cursor-pointer]="col.key === 'full_name' || col.key === 'phone_number' || col.key === 'created_at'"
          [class.select-none]="col.key === 'full_name' || col.key === 'phone_number' || col.key === 'created_at'"
          (click)="(col.key === 'full_name' || col.key === 'phone_number' || col.key === 'created_at') && changeSort(col.key)"
        >
                  <span class="flex items-center gap-1">
                    {{ col.label }}
                    <ng-container *ngIf="sortColumn === col.key">
                      <mat-icon svgIcon="arrow_upward" *ngIf="sortOrder === 'asc'" class="inline text-xs"></mat-icon>
                      <mat-icon svgIcon="arrow_downward" *ngIf="sortOrder === 'desc'" class="inline text-xs"></mat-icon>
                    </ng-container>
                    <ng-container *ngIf="sortColumn !== col.key && (col.key === 'full_name' || col.key === 'phone_number' || col.key === 'created_at')">
                      <mat-icon svgIcon="swap_vert" class="inline text-xs text-gray-300"></mat-icon>
                    </ng-container>
                  </span>
                </th>
                <th *ngIf="col.key === 'actions'" 
                [ngClass]="col.className"
                class="py-3 px-6 text-xs font-medium text-gray-500 uppercase tracking-wider">
                 {{ col.label }}
                </th>
                <th *ngIf="col.key === 'all'" class="text-xs font-medium text-gray-500 uppercase tracking-wider">
                </th>
              </ng-container>
            </thead>
            <tbody class="divide-y divide-gray-200">
              <tr *ngFor="let row of displayData" class="hover:bg-gray-50 cursor-pointer">
                <td *ngFor="let col of tableColumns" class="py-4 px-6" [ngClass]="col.className || 'text-left'">
                  <ng-container [ngSwitch]="col.key">
                    <div *ngSwitchCase="'actions'">
                      <div class="inline-flex items-center gap-2">
                        <button (click)="openDetailModal(row.id)" class="!text-yellow-500 hover:!text-yellow-600 focus:!text-yellow-700">
                          <mat-icon style="transform: scale(0.9); color: #eab308 !important;" svgIcon="create"></mat-icon>
                        </button>
                        <button (click)="openConfirmModel(row.id)" class="!text-red-500 hover:!text-red-600 focus:!text-red-700">
                          <mat-icon style="transform: scale(0.9); color: #ef4444 !important;" svgIcon="delete_forever"></mat-icon>
                        </button>
                      </div>
                    </div>


                    <span *ngSwitchCase="'full_name'">
                        {{ row[col.key] }}
                      <mat-icon svgIcon="circle" class="absolute leading-none"
                [ngClass]="row.is_active ? 'text-green-500' : 'text-red-500'" style="transform: scale(0.3);"
                [attr.title]="row.is_active ? 'Active' : 'Inactive'">
              </mat-icon>
                    </span>

                    <span *ngSwitchDefault class="font-sans text-gray-900">
                      {{ row[col.key] }}
                    </span>
                  </ng-container>
                </td>
              </tr>
            </tbody>
            </table>
          </div>
  <div class="flex items-center justify-between p-4 min-w-full bg-white">
    <div class="text-sm text-gray-600">
      Show result:
      <select [(ngModel)]="pageSize" (change)="changePage(1)"
        class="ml-2 border border-gray-300 rounded px-2 py-1 text-sm">
        <option *ngFor="let size of [10,25,50,100]" [value]="size">{{ size }}</option>
      </select>
      of {{ totalItems }} items
    </div>
    <div class="flex items-center space-x-1">
      <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1"
        class="w-8 h-8 flex items-center justify-center border rounded-full text-gray-600 hover:bg-gray-200 disabled:opacity-50">
        <mat-icon svgIcon="arrow_left"></mat-icon>
      </button>
      <ng-container *ngFor="let page of paginationArray">
        <button (click)="changePage(page)" [ngClass]="{
                'bg-black text-white': currentPage === page,
                'text-gray-600 hover:bg-gray-200': currentPage !== page
              }" class="w-8 h-8 flex items-center justify-center border rounded-xl text-sm font-medium">
          {{ page }}
        </button>
      </ng-container>
      <button (click)="changePage(currentPage + 1)" [disabled]="currentPage === totalPages"
        class="w-8 h-8 flex items-center justify-center border rounded-full text-gray-600 hover:bg-gray-200 disabled:opacity-50">
        <mat-icon svgIcon="arrow_right"></mat-icon>
      </button>
    </div>
  </div>
  </div>

      <div *ngIf="isCreateModalOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" (click)="closeModal('create')">
        <div class="bg-gray-100 rounded-lg shadow-2xl w-full max-w-2xl max-h-[120vh]" (click)="$event.stopPropagation()">
          <app-add-customer (closeModalRequest)="closeModal('create')" (customerAdded)="loadCustomers()"></app-add-customer>
        </div>
      </div>

      <div *ngIf="isDetailModalOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" (click)="closeModal('detail')">
        <div class="bg-gray-100 rounded-lg shadow-2xl w-full max-w-2xl max-h-[120vh]" (click)="$event.stopPropagation()">
          <app-customer-detail (closeModalRequest)="closeModal('detail')" (editRequest)="onCustomerEdited($event)" [customerId]="passCustomerId"></app-customer-detail>
        </div>
      </div>
    </div>
</div>
