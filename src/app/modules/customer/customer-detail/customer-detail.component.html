<app-common-dialog [show]="open" [title]="customerSelected?.full_name" [width]="'54vw'" [maxWidth]="'1000px'"
    [maxHeight]="'95vh'" [showClose]="true" (closed)="close()">
    <div dialog-header>
        <p class="text-gray-500">
            Phone: <span class="font-semibold text-gray-700">{{ customerSelected?.phone_number }}</span>
        </p>
        <div class="flex items-center space-x-3">
            <button *ngIf="!isEditMode"
                class="rounded-lg bg-[#DEE33E] px-4 py-2 text-sm font-medium text-black hover:bg-yellow-200"
                (click)="onEditClick()">Edit</button>
            <button *ngIf="!isEditMode" (click)="openConfirmModal()"
                class="rounded-lg bg-red-400 px-4 py-2 text-sm font-medium text-black hover:bg-red-400">Delete</button>
        </div>
    </div>
    <div dialog-content>
        <form *ngIf="customerForm" [formGroup]="customerForm">
            <div class="rounded-lg bg-white p-4 shadow">
                <div class="border-b border-gray-200 px-4">
                    <nav class="-mb-px flex items-center justify-between space-x-6">
                        <a class="border-b-2 border-yellow-200 px-1 py-3 text-sm font-medium text-[#DEE33E]"> Customer
                            Info </a>
                    </nav>
                </div>
                <div class="px-4 py-5 overflow-auto">
                    <div class="grid grid-cols-1 gap-x-6 gap-y-4 text-sm md:grid-cols-2">
                        <div *ngFor="let field of fields" class="flex flex-col">
                            <label class="text-gray-500">{{ field.label }}</label>
                            <ng-container *ngIf="!isEditMode; else editField">
                                <ng-container *ngIf="field.name === 'is_active'; else normalView">
                                    <div class="flex items-center gap-6">
                                        <label class="inline-flex items-center gap-2"
                                            [ngClass]="field.value === true ? 'border-green-300 bg-green-50 text-green-800' : 'border-slate-200 text-slate-600'">
                                            <input disabled type="radio" [checked]="field.value === true" />
                                            <span class="font-semibold">Active</span>
                                        </label>
                                        <label class="inline-flex items-center gap-2"
                                            [ngClass]="field.value === false ? 'border-red-300 bg-red-50 text-red-800' : 'border-slate-200 text-slate-600'">
                                            <input disabled type="radio" [checked]="field.value === false" />
                                            <span class="font-semibold">Inactive</span>
                                        </label>
                                    </div>
                                </ng-container>
                                <ng-template #normalView>
                                    <span class="font-semibold">{{ field.value }}</span>
                                </ng-template>
                            </ng-container>
                            <ng-template #editField>
                                <ng-container *ngIf="field.type === 'select'; else radioType">
                                    <mat-form-field appearance="outline" class="w-full">
                                        <mat-select [formControlName]="field.name" [placeholder]="'-- Select --'">
                                            <ngx-mat-select-search [formControl]="field.searchCtrl"
                                                placeholderLabel="Search..."
                                                noEntriesFoundLabel="No results found"></ngx-mat-select-search>
                                            <mat-option [value]="null" disabled>-- Select --</mat-option>
                                            <mat-option *ngFor="let opt of field.options" [value]="opt.value">{{
                                                opt.label }}</mat-option>
                                        </mat-select>
                                    </mat-form-field>
                                    <div class="mt-1 text-xs text-red-600" *ngIf="showError(field.name)">
                                        {{ getErorrMessage(field.name, field.label) }}
                                    </div>
                                </ng-container>
                                <ng-template #radioType>
                                    <ng-container *ngIf="field.type === 'boolean'; else textType">
                                        <div class="flex items-center gap-6">
                                            <label class="inline-flex items-center gap-2"
                                                [ngClass]="'border-green-300 bg-green-50 text-green-800'">
                                                <input type="radio" [formControlName]="field.name" [value]="true" />
                                                <span class="font-semibold">Active</span>
                                            </label>
                                            <label class="inline-flex items-center gap-2"
                                                [ngClass]="'border-red-300 bg-red-50 text-red-800'">
                                                <input type="radio" [formControlName]="field.name" [value]="false" />
                                                <span class="font-semibold">Inactive</span>
                                            </label>
                                            <div class="mt-1 text-xs text-red-600" *ngIf="showError(field.name)">
                                                {{ getErorrMessage(field.name, field.label) }}
                                            </div>
                                        </div>
                                    </ng-container>
                                    <ng-template #textType>
                                        <input [type]="field.type === 'date' ? 'date' : (field.type || 'text')"
                                            [formControlName]="field.name"
                                            class="form-input border border-gray-300 rounded-xl p-1 font-semibold" />
                                        <div class="mt-1 text-xs text-red-600" *ngIf="showError(field.name)">
                                            {{ getErorrMessage(field.name, field.label) }}
                                        </div>
                                    </ng-template>
                                </ng-template>
                            </ng-template>
                        </div>
                    </div>
                </div>
            </div>
        </form>
        <app-loading *ngIf="loadingService.loading$ | async" class="z-[10000]"></app-loading>
        <app-confirm-model [open]="openConfirm" [title]="'Delete'"
            [message]="'Are you sure you want to delete this customer?'" [confirmText]="'Delete'"
            [cancelText]="'Cancel'" (confirmed)="onConfirmDelete()" (cancelled)="onCancelDelete()">
        </app-confirm-model>
    </div>
    <div dialog-footer>
        <div *ngIf="isEditMode" class="flex space-x-2">
            <button type="button" [disabled]="form.invalid" (click)="onFormSubmit()"
                class="rounded-lg bg-[#DEE33E] px-4 py-2 text-sm font-medium text-black hover:bg-yellow-200">
                Save
            </button>
            <button type="button" (click)="onCancelEdit()"
                class="rounded-lg bg-gray-200 px-4 py-2 text-sm font-medium text-black hover:bg-gray-400">Cancel</button>
        </div>
    </div>
</app-common-dialog>
