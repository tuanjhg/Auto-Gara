<div class="p-5">
  <div class="flex flex-row justify-between">
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Add New Vehicle</h1>
        <p class="text-gray-500">
          Step {{ currentStep + 1 }} of {{ formSections.length }}: {{ currentSection.title }}
        </p>
    </div>
        <button class="mb-6" (click)="close()">
          <mat-icon svgIcon="exit_to_app"></mat-icon>
        </button>
  </div>
  <div>
    <div class="mb-8 flex justify-between">
      <div *ngFor="let section of formSections; let i = index" class="flex-1">
        <div 
          class="w-full py-1"
          [ngClass]="{
            'bg-[#DEE33E]': i <= currentStep, 
            'bg-gray-200': i > currentStep,
            'rounded-l-full': i === 0,
            'rounded-r-full': i === formSections.length - 1
          }"
        ></div>
      </div>
    </div>
    <form [formGroup]="vehicleForm" (ngSubmit)="addVehicle()" class="space-y-8 h-120 overflow-y-auto">
      <div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
          <ng-container *ngFor="let field of currentSection.fields">
            <div [ngClass]="field.colspan === 2 ? 'col-span-1 md:col-span-2' : ''" class="flex flex-col">
              <label [for]="field.name" class="mb-1 block font-medium text-gray-700">
                {{ field.label }}<span *ngIf="field.required" class="text-red-500"> *</span>
              </label>
              <ng-container [ngSwitch]="field.type">
                <input 
                  *ngSwitchCase="'text'"
                  [id]="field.name"
                  [type]="field.type"
                  [placeholder]="field.placeholder"
                  [formControlName]="field.name"
                  class="form-input border rounded-2xl px-3 py-2 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
                  [class.border-red-500]="vehicleForm.get(field.name)?.invalid && vehicleForm.get(field.name)?.touched"
                  [class.border-green-500]="vehicleForm.get(field.name)?.valid && vehicleForm.get(field.name)?.touched"
                />
                <input
                  *ngSwitchCase="'number'"
                  [id]="field.name"
                  [type]="field.type"
                  [placeholder]="field.placeholder"
                  [formControlName]="field.name"
                  class="form-input border rounded-2xl px-3 py-2 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
                  [class.border-red-500]="vehicleForm.get(field.name)?.invalid && vehicleForm.get(field.name)?.touched"
                  [class.border-green-500]="vehicleForm.get(field.name)?.valid && vehicleForm.get(field.name)?.touched"
                />
                <input
                  *ngSwitchCase="'tel'"
                  [id]="field.name"
                  [type]="field.type"
                  [placeholder]="field.placeholder"
                  [formControlName]="field.name"
                  class="form-input border rounded-2xl px-3 py-2 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
                  [class.border-red-500]="vehicleForm.get(field.name)?.invalid && vehicleForm.get(field.name)?.touched"
                  [class.border-green-500]="vehicleForm.get(field.name)?.valid && vehicleForm.get(field.name)?.touched"
                />
                <input
                  *ngSwitchCase="'date'"
                  [id]="field.name"
                  type="date"
                  [formControlName]="field.name"
                  class="form-input border rounded-2xl px-3 py-2 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
                  [class.border-red-500]="vehicleForm.get(field.name)?.invalid && vehicleForm.get(field.name)?.touched"
                  [class.border-green-500]="vehicleForm.get(field.name)?.valid && vehicleForm.get(field.name)?.touched"
                />
                <select
                  *ngSwitchCase="'select'"
                  [id]="field.name"
                  [formControlName]="field.name"
                  class="form-input border rounded-2xl px-3 py-2 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
                  [class.border-red-500]="vehicleForm.get(field.name)?.invalid && vehicleForm.get(field.name)?.touched"
                  [class.border-green-500]="vehicleForm.get(field.name)?.valid && vehicleForm.get(field.name)?.touched"
                >
                  <option value="" disabled selected hidden>--Select--</option>
                  <ng-container *ngIf="field.name === 'tenant_id'">
                    <ng-container *ngIf="tenants.length > 0; else noTenant">
                      <option *ngFor="let tenant of tenants" [value]="tenant.tenant_id">{{ tenant.name }}</option>
                    </ng-container>
                    <ng-template #noTenant>
                      <option disabled>No tenant found</option>
                    </ng-template>
                  </ng-container>
                  <ng-container *ngIf="field.name === 'customer_id'">
                    <ng-container *ngIf="owners.length > 0; else noOwner">
                      <option *ngFor="let owner of owners" [value]="owner.customer_id">{{ owner.full_name }}</option>
                    </ng-container>
                    <ng-template #noOwner>
                      <option disabled>No owner found</option>
                    </ng-template>
                  </ng-container>

                </select>
              </ng-container>
              <div style="min-height: 18px;">
                <div 
                  *ngIf="vehicleForm.get(field.name)?.invalid && vehicleForm.get(field.name)?.touched" 
                  class="mt-1 text-xs text-red-500"
                >
                  <span *ngIf="vehicleForm.get(field.name)?.errors?.['required']">
                    {{ field.label }} is required.
                  </span>
                </div>
              </div>
            </div>
          </ng-container>
        </div>
      </div>
      <div class="flex justify-between border-t pt-4 ">
        <div>
          <button 
            *ngIf="currentStep > 0"
            type="button" 
            (click)="previousStep()" 
            class=" rounded-lg bg-gray-300 hover:bg-gray-400 px-4 py-2 text-sm font-medium">
            Back
          </button>
        </div>
        <div>
          <button
              *ngIf="currentStep < formSections.length - 1"
              type="button" 
              (click)="nextStep()" 
              class="rounded-lg bg-[#DEE33E] hover:bg-yellow-200 px-4 py-2 text-sm font-medium text-black disabled:opacity-60"
            >
              Next
            </button>
          <button 
            *ngIf="currentStep === formSections.length - 1"
            type="submit" 
            [disabled]="vehicleForm.invalid" 
            class="rounded-lg bg-[#DEE33E] hover:bg-yellow-200 px-4 py-2 text-sm font-medium text-black disabled:opacity-60"
          >
            Save Vehicle
          </button>
        </div>
      </div>
    </form>
    <app-confirm-model
      [open]="showConfirmModal"
      title = "Add new car ?"
      message = "Are you sure you want to add this car?"
      confirmText = "Agree"
      cancelText = "Cancel"
      (confirmed)="onConfirmAddVehicle()"
      (cancelled)="onCancelAddVehicle()"
    ></app-confirm-model>
  </div>
</div>
