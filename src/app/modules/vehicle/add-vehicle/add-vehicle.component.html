<app-common-dialog [title]="'Add Vehicle'" [show]="true" [showClose]="true" (closed)="close()" [width]="'54vw'"
  [maxWidth]="'1000px'" [maxHeight]="'95vh'">
  <form [formGroup]="vehicleForm" class="grid grid-cols-1 md:grid-cols-2 gap-6" dialog-content>
    <div *ngFor="let field of formFields" class="flex flex-col">
      <label class="text-sm font-medium text-gray-600 mb-1">
        {{ field.label }} <span *ngIf="field.required" class="text-red-500"> *</span>
      </label>
      <ng-container [ngSwitch]="field.type">
        <div *ngSwitchCase="'date'" class="relative w-full flex items-center">
          <input matInput [matDatepicker]="picker" [formControlName]="field.name" [placeholder]="field.placeholder"
            class="form-input w-full border rounded-2xl px-3 py-2 pr-10 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
            [class.border-red-500]="vehicleForm.get(field.name)?.invalid && vehicleForm.get(field.name)?.touched"
            [class.border-green-500]="vehicleForm.get(field.name)?.valid && vehicleForm.get(field.name)?.touched">
          <mat-datepicker-toggle matSuffix [for]="picker"
            class="absolute right-0 mr-2 text-gray-400"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </div>
        <input *ngSwitchCase="'text'" [formControlName]="field.name" [placeholder]="field.placeholder"
          class="form-input border rounded-2xl px-3 py-2 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
          [class.border-red-500]="vehicleForm.get(field.name)?.invalid && vehicleForm.get(field.name)?.touched"
          [class.border-green-500]="vehicleForm.get(field.name)?.valid && vehicleForm.get(field.name)?.touched" />
        <input *ngSwitchCase="'number'" [formControlName]="field.name" [placeholder]="field.placeholder" type="number"
          class="form-input border rounded-2xl px-3 py-2 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
          [class.border-red-500]="vehicleForm.get(field.name)?.invalid && vehicleForm.get(field.name)?.touched"
          [class.border-green-500]="vehicleForm.get(field.name)?.valid && vehicleForm.get(field.name)?.touched" />
        <input *ngSwitchCase="'tel'" [formControlName]="field.name" [placeholder]="field.placeholder" type="tel"
          class="form-input border rounded-2xl px-3 py-2 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
          [class.border-red-500]="vehicleForm.get(field.name)?.invalid && vehicleForm.get(field.name)?.touched"
          [class.border-green-500]="vehicleForm.get(field.name)?.valid && vehicleForm.get(field.name)?.touched" />
        <div *ngSwitchCase="'select'">
          <div appearance="outline"
            class="w-full font-medium focus:ring-2 focus:ring-yellow-500 bg-white rounded-2xl border border-gray-300 px-3 py-1 min-h-0 h-[36px]">
            <mat-select [formControlName]="field.name" [panelClass]="'tw-select-panel'" disableRipple
              [placeholder]="field.placeholder" class="min-h-0 h-[36px] text-sm font-medium px-2 py-1">
              <mat-option>
                <ngx-mat-select-search
                  [formControl]="field.name === 'tenant_id' ? searchForm.get('tenantSearch') : searchForm.get('customerSearch')"
                  placeholderLabel="Search ..."
                  class="rounded border border-gray-200 bg-gray-50 text-xs px-1.5 py-0.5 focus:ring-2 focus:ring-yellow-400 min-h-0 h-[28px]">
                </ngx-mat-select-search>
              </mat-option>
              <mat-option *ngIf="field.name === 'tenant_id' && isTenantLoading" disabled class="text-center">
                <div class="flex items-center justify-center py-2">
                  <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-gray-900"></div>
                  <span class="ml-2 text-sm text-gray-500">Loading...</span>
                </div>
              </mat-option>
              <mat-option *ngIf="field.name === 'customer_id' && isCustomerLoading" disabled class="text-center">
                <div class="flex items-center justify-center py-2">
                  <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-gray-900"></div>
                  <span class="ml-2 text-sm text-gray-500">Loading...</span>
                </div>
              </mat-option>
              <mat-option *ngFor="let option of field.name === 'tenant_id' ? filteredTenants : filteredCustomers"
                [value]="option.value" class="text-sm font-medium min-h-0 h-[32px]">{{ option.label }}</mat-option>
            </mat-select>
          </div>
        </div>

      </ng-container>
      <p *ngIf="showError(field.name)" class="mt-1 text-xs text-red-600">
        {{ getMsg(field.name,field.label) }}
      </p>
    </div>
  </form>
  <div dialog-footer class="col-span-1 md:col-span-2 flex justify-end space-x-3 pt-2 mt-4">
    <button type="button" (click)="close()"
      class="rounded-lg bg-gray-300 hover:bg-gray-400 px-4 py-2 text-sm font-medium">
      Cancel
    </button>
    <button type="button" [disabled]="vehicleForm.invalid"
      class="rounded-lg bg-[#DEE33E] hover:bg-yellow-200 px-4 py-2 text-sm font-medium text-black disabled:opacity-60"
      (click)="showConfirmModal = true">
      Save
    </button>
    <app-confirm-model [open]="showConfirmModal" title="Add new car ?" message="Are you sure you want to add this car?"
      confirmText="Agree" cancelText="Cancel" (confirmed)="onConfirmAddVehicle()"
      (cancelled)="onCancelAddVehicle()"></app-confirm-model>
  </div>
</app-common-dialog>
