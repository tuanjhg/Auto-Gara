<app-common-dialog [title]="'Add Part'" [show]="true" [showClose]="true" (closed)="close()" [width]="'54vw'" [maxWidth]="'1000px'" [maxHeight]="'95vh'">
    <form [formGroup]="formAdd" (ngSubmit)="onSubmit()" id="addFormPart" class="grid grid-cols-1 md:grid-cols-2 gap-6" dialog-content>
        <div *ngFor="let field of fields" class="flex flex-col">
            <label class="text-sm font-medium text-gray-600 mb-1">{{ field.label }} <span *ngIf="field.require" class="text-red-500"> *</span></label>
            <input
                *ngIf="field.type === 'text' || field.type === 'number'"
                [formControlName]="field.name"
                [placeholder]="field.placeholder"
                class="form-select border border-gray-300 rounded-xl p-1 font-semibold placeholder:font-normal placeholder:text-gray-400 bg-white"
                [class.border-red-500]="showError(field.name)"
                [class.border-green-500]="!showError(field.name) && formAdd.get(field.name)?.value"
            />
            <select
                *ngIf="field.type === 'select'"
                [formControlName]="field.name"
                [placeholder]="field.placeholder"
                class="form-select border border-gray-300 rounded-xl p-1 placeholder:font-normal placeholder:text-gray-400 bg-white"
                [class.border-red-500]="showError(field.name)"
                [class.border-green-500]="!showError(field.name) && formAdd.get(field.name)?.value"
            >
                <option [ngValue]="null" class="text-gray-400" disabled>
                    {{ field.placeholder }}
                </option>
                <option *ngFor="let opt of field.options" [ngValue]="opt.value">{{ opt.label }}</option>
            </select>
            <div class="flex items-center gap-6" *ngIf="field.type === 'boolean'">
                <label class="inline-flex items-center gap-2" [ngClass]="'border-green-300 bg-green-50 text-green-800'">
                    <input type="radio" [formControlName]="field.name" [value]="true" />
                    <span class="font-semibold">Active</span>
                </label>

                <label class="inline-flex items-center gap-2" [ngClass]="'border-red-300 bg-red-50 text-red-800'">
                    <input type="radio" [formControlName]="field.name" [value]="false" />
                    <span class="font-semibold">Inactive</span>
                </label>
            </div>
            <p *ngIf="showError(field.name)" class="mt-1 text-xs text-red-600">
                {{ getMsg(field.name, field.label) }}
            </p>
        </div>
    </form>
    <div dialog-footer class="col-span-1 md:col-span-2 flex justify-end space-x-3 pt-2 mt-4">
        <button type="button" (click)="close()" class="rounded-lg bg-gray-300 hover:bg-gray-400 px-4 py-2 text-sm font-medium">Cancel</button>
        <button
            type="submit"
            form="addFormPart"
            [disabled]="formAdd.invalid"
            class="rounded-lg bg-[#DEE33E] hover:bg-yellow-200 px-4 py-2 text-sm font-medium text-black disabled:opacity-60"
        >
            Save
        </button>
    </div>
</app-common-dialog>
