<app-common-dialog [title]="'Add Gara'" [show]="true" [showClose]="true" (closed)="close()" [width]="'54vw'" [maxWidth]="'1000px'" [maxHeight]="'95vh'">
    <form [formGroup]="formAdd" id="addGaraForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-6" dialog-content>
        <div *ngFor="let field of fields" class="flex flex-col gap-1" [ngClass]="{ 'col-span-1 md:col-span-2': field.name === 'owner_user_id' }">
            <label class="text-sm font-medium text-gray-600 mb-1"
                >{{ field.label }} <span *ngIf="field.name === 'owner_user_id'">(No Owner Yet? Click “Create Owner”)</span>
                <ng-container><span *ngIf="field.require" class="text-red-500"> *</span></ng-container></label
            >

            <input
                *ngIf="field.type === 'text' || field.type === 'email' || field.type === 'tel'"
                [formControlName]="field.name"
                [placeholder]="field.placeholder"
                class="form-input border rounded-2xl px-3 py-2 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
                [class.border-red-500]="showError(field.name)"
                [class.border-green-500]="!showError(field.name) && formAdd.get(field.name)?.value"
            />

            <div *ngIf="field.type === 'select' && field.name === 'owner_user_id'" class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end w-full">
                <select
                    *ngIf="field.type === 'select'"
                    [formControlName]="field.name"
                    class="col-span-1 md:col-span-8 w-full h-[42px] form-input border rounded-2xl px-3 py-2 font-medium border-gray-300 focus:ring-2 focus:ring-yellow-500 bg-white"
                    [class.border-red-500]="showError(field.name)"
                    [class.border-green-500]="!showError(field.name) && formAdd.get(field.name)?.value"
                >
                    <option [ngValue]="null" class="text-gray-400">
                        {{ field.placeholder }}
                    </option>
                    <option *ngFor="let opt of field.options" [ngValue]="opt.value">{{ opt.label }}</option>
                </select>
                <button
                    type="button"
                    class="col-span-1 md:col-span-4 md:justify-self-end w-full h-[42px] rounded-xl px-3 py-2 font-semibold bg-gray-200 hover:bg-gray-300 disabled:bg-gray-200 disabled:text-gray-400 disabled:opacity-50 disabled:cursor-not-allowed disabled:pointer-events-none"
                    (click)="onCreateOwner()"
                    [disabled]="field.options?.length > 0"
                >
                    Create Owner
                </button>
            </div>
            <div class="flex items-center gap-6" *ngIf="field.type === 'boolean'">
                <label class="inline-flex items-center gap-2" [ngClass]="'border-green-300 bg-green-50 text-green-800'">
                    <input type="radio" [formControlName]="field.name" [value]="true" />
                    <span class="font-semibold">Active</span>
                </label>

                <label class="inline-flex items-center gap-2" [ngClass]="'border-red-300 bg-red-50 text-red-800'">
                    <input type="radio" [formControlName]="field.name" [value]="false" />
                    <span class="font-semibold">Inactive</span>
                </label>
            </div>

            <p *ngIf="showError(field.name)" class="mt-1 text-xs text-red-600">
                {{ getMsg(field.name, field.label) }}
            </p>
        </div>
    </form>

    <div dialog-footer class="col-span-1 md:col-span-2 flex justify-end space-x-3 pt-2">
        <button type="button" (click)="close()" class="rounded-lg bg-gray-300 hover:bg-gray-400 px-4 py-2 text-sm font-medium">Cancel</button>
        <button
            type="submit"
            form="addGaraForm"
            [disabled]="formAdd.invalid"
            class="rounded-lg bg-[#DEE33E] hover:bg-yellow-200 px-4 py-2 text-sm font-medium text-black disabled:opacity-60"
        >
            Save
        </button>
    </div>
</app-common-dialog>
