<div *ngIf="open" class="fixed inset-0 z-[999] flex items-center justify-center" role="dialog" aria-modal="true">
    <div class="absolute inset-0 bg-black/50" (click)="cancel()"></div>
    <div class="relative z-10 w-[90vw] max-w-md rounded-2xl bg-white shadow-2xl ring-1 ring-gray-200 overflow-hidden">
        <div class="bg-[#DEE33E] px-6 py-4">
            <h3 class="text-lg md:text-xl font-extrabold text-gray-900 text-center">
                {{ title }}
            </h3>
        </div>
        <div class="h-px bg-gray-200"></div>
        <div class="px-6 py-5 text-center">
            <p class="text-[15px] leading-6 text-gray-700">
                {{ message }}
            </p>
        </div>
        <div class="h-px bg-gray-200"></div>
        <div class="px-6 py-4 flex items-center justify-center gap-3">
            <button type="button" class="px-4 py-2 rounded-xl text-sm font-medium" [ngClass]="cancelClass"
                (click)="cancel()">
                {{ cancelText }}
            </button>
            <button type="button" class="px-5 py-2 rounded-xl text-sm font-semibold" [ngClass]="confirmClass"
                (click)="confirm()">
                {{ confirmText }}
            </button>
        </div>
    </div>
</div>
