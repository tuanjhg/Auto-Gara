<header class="w-full bg-white p-4 flex items-center justify-between border-b border-gray-200">
  
  <div>
    <h1 class="text-2xl font-bold text-gray-900">{{currentFeature}}</h1>
    <p class="text-sm text-gray-500">Let's check your Garage today</p>
  </div>

  <div class="flex items-center space-x-6">
    <div class="flex items-center space-x-5">
      <button class="relative text-gray-600 hover:bg-gray-200">
       <mat-icon svgIcon="email"></mat-icon>
      </button>
      <button class="relative text-gray-600 hover:bg-gray-200">
        <mat-icon svgIcon="notifications"></mat-icon>
      </button>
    </div>

    <div class="h-8 w-px bg-gray-200"></div>
    
    <button class="flex items-center space-x-3">
    <button class="relative text-gray-600 hover:bg-gray-200">
      <img [src]="userAvatarUrl" alt="User Avatar" class="w-10 h-10 rounded-full">
      </button>
      <div class="text-left">
        <div class="font-semibold text-sm text-gray-800">{{ userName }}</div>
        <div class="text-xs text-gray-500">{{ userRole }}</div>
      </div>
    </button>
    
  </div>

</header>
