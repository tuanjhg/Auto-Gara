<header class="w-full bg-white p-4 flex items-center justify-between border-b border-gray-200 transition-all duration-300" [ngClass]="sidebarCollapsed ? 'pl-8' : 'pl-0'">
  
  <div class="flex items-center">
    <button (click)="toggleSidebar.emit()" class="mr-4 text-gray-600 hover:bg-gray-200 rounded-full p-2">
      <mat-icon svgIcon="menu"></mat-icon>
    </button>
    <div>
  <h1 class="text-2xl font-bold text-gray-900">{{headerTitle}}</h1>
  <p class="text-sm text-gray-500">{{headerSubtitle}}</p>
    </div>
  </div>

  <div class="flex items-center space-x-6">
    <div class="flex items-center space-x-5">
      <button class="relative text-gray-600 hover:bg-gray-200 rounded-full ">
       <mat-icon svgIcon="email"></mat-icon>
      </button>
      <button class="relative text-gray-600 hover:bg-gray-200 rounded-full ">
        <mat-icon svgIcon="notifications"></mat-icon>
      </button>
    </div>

    <div class="h-8 w-px bg-gray-200"></div>
    
    <div class="relative">
      <button class="relative text-gray-600 hover:bg-gray-200 rounded-full " (click)="isDropdownOpen = !isDropdownOpen">
        <img [src]="userAvatarUrl" alt="User Avatar" class="w-10 h-10 rounded-full">
      </button>
      <div *ngIf="isDropdownOpen" class="absolute right-0 mt-2 w-30 bg-white border rounded-xl shadow-lg z-50">
      </div>
    </div>
    <div class="text-left">
      <div class="font-semibold text-sm text-gray-800">{{ userName }}</div>
      <div class="text-xs text-gray-500">{{ userRole }}</div>
    </div>
  </div>

</header>
